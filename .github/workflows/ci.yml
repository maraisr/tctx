name: CI

on:
  push:
    branches: ['**']
    tags: ['v**']

env:
  DENO_VERSION: 2.8.3

jobs:
  health:
    name: health
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - run: deno lint
      - run: deno fmt --check
      - run: deno check lib/*.ts

      - run: deno test --no-check --coverage
      - run: deno coverage

  validation:
    name: w3c validation
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: w3c validation test
        run: ./validation/javascript.sh

  dryrun:
    needs: [health, validation]
    name: 'publish (dry run)'
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: deno task build
      - run: npm publish --dry-run
        working-directory: npm
      - run: deno publish --no-check --dry-run

  # https://jsr.io/docs/publishing-packages#publishing-from-github-actions
  # https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages#publishing-packages-to-the-npm-registry
  publish:
    needs: [health, validation]
    name: publish
    runs-on: ubuntu-24.04-arm
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write # -> authentication
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.3
        with:
          deno-version: ${{ env.DENO_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: deno task build

      - name: 'Publish → jsr'
        if: ${{ !contains(github.ref, '-next.') }}
        run: deno publish --no-check

      - name: 'Publish → npm'
        if: ${{ !contains(github.ref, '-next.') }}
        run: npm publish --provenance --access public
        working-directory: npm

      - name: 'Publish → npm (pre-release)'
        if: ${{ contains(github.ref, '-next.') }}
        run: npm publish --tag next --provenance --access public
        working-directory: npm
